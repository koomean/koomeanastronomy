<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>StarView — koomean</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif}
canvas{display:block;cursor:grab}
canvas.dragging{cursor:grabbing}

/* ── top bar ── */
.top-bar{position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);z-index:50;pointer-events:none}
.top-bar>*{pointer-events:all}
.logo{display:flex;align-items:center;gap:8px;color:#fff;font-size:1rem;font-weight:700;letter-spacing:.5px;opacity:.9}
.logo i{color:#7ec8e3;font-size:1.1rem}
.top-right{display:flex;align-items:center;gap:10px}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:50px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.45);backdrop-filter:blur(12px);color:rgba(255,255,255,.8);font-size:.78rem;font-weight:600;text-decoration:none;cursor:pointer;transition:all .2s;white-space:nowrap}
.pill:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.35);color:#fff}
.pill i{font-size:.78rem}

/* ── bottom info bar ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px 20px;background:linear-gradient(to top,rgba(0,0,0,.75),transparent);z-index:50;display:flex;align-items:flex-end;justify-content:space-between;pointer-events:none}
.bottom-bar>*{pointer-events:all}
.time-display{color:#fff;font-size:1rem;font-weight:300;line-height:1.5;opacity:.88}
.time-display .clock{font-size:1.5rem;font-weight:600;letter-spacing:1px;font-variant-numeric:tabular-nums}
.time-display .date-loc{font-size:.75rem;opacity:.65;margin-top:2px}
.controls{display:flex;gap:8px}
.ctrl-btn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.5);backdrop-filter:blur(8px);color:rgba(255,255,255,.75);font-size:.9rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;outline:none}
.ctrl-btn:hover{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.4)}
.ctrl-btn.active{background:rgba(126,200,227,.2);border-color:#7ec8e3;color:#7ec8e3}

/* ── star info popup ── */
.star-popup{position:fixed;background:rgba(5,10,20,.88);backdrop-filter:blur(16px);border:1px solid rgba(126,200,227,.3);border-radius:14px;padding:14px 18px;color:#fff;font-size:.85rem;pointer-events:none;z-index:60;max-width:220px;opacity:0;transform:translateY(6px);transition:opacity .25s,transform .25s}
.star-popup.show{opacity:1;transform:translateY(0)}
.star-popup .sp-name{font-size:1.05rem;font-weight:700;color:#7ec8e3;margin-bottom:6px}
.star-popup .sp-row{display:flex;justify-content:space-between;gap:12px;color:rgba(255,255,255,.7);font-size:.78rem;margin-top:3px}
.star-popup .sp-val{color:#fff;font-weight:500}

/* ── location dialog ── */
.loc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.loc-box{background:#0d1420;border:1px solid rgba(126,200,227,.25);border-radius:20px;padding:28px;width:90%;max-width:360px;color:#fff}
.loc-box h3{font-size:1.1rem;margin-bottom:4px;color:#7ec8e3}
.loc-box p{font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:20px}
.loc-input-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.loc-input-row label{font-size:.75rem;color:rgba(255,255,255,.55);margin-bottom:4px;display:block}
.loc-input-row input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:9px 12px;color:#fff;font-size:.9rem;outline:none;font-family:inherit}
.loc-input-row input:focus{border-color:rgba(126,200,227,.5)}
.loc-btns{display:flex;gap:10px;margin-top:6px}
.loc-btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.loc-btn.primary{background:linear-gradient(135deg,#2a6b8a,#3d9abf);color:#fff}
.loc-btn.secondary{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1)}
.loc-btn:hover{filter:brightness(1.15)}

/* ── search ── */
.search-wrap{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:60;width:90%;max-width:320px;display:none}
.search-wrap.show{display:block}
.search-input{width:100%;background:rgba(5,10,20,.92);backdrop-filter:blur(16px);border:1px solid rgba(126,200,227,.3);border-radius:12px;padding:12px 16px;color:#fff;font-size:.95rem;font-family:inherit;outline:none}
.search-input::placeholder{color:rgba(255,255,255,.35)}
.search-results{background:rgba(5,10,20,.95);border:1px solid rgba(255,255,255,.1);border-radius:10px;margin-top:6px;overflow:hidden;max-height:220px;overflow-y:auto}
.search-result-item{padding:10px 16px;cursor:pointer;font-size:.88rem;color:rgba(255,255,255,.8);border-bottom:1px solid rgba(255,255,255,.05);transition:background .15s}
.search-result-item:hover{background:rgba(126,200,227,.1);color:#fff}
.search-result-item:last-child{border-bottom:none}
.sr-mag{font-size:.75rem;color:rgba(255,255,255,.4);margin-left:6px}

/* ── legend ── */
.legend{position:fixed;right:14px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px;z-index:50;display:flex;flex-direction:column;gap:8px}
.leg-item{display:flex;align-items:center;gap:7px;font-size:.7rem;color:rgba(255,255,255,.55)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

@media(max-width:480px){.logo span{display:none}.legend{display:none}}
</style>
</head>
<body>

<!-- canvas -->
<canvas id="sky"></canvas>

<!-- top bar -->
<div class="top-bar">
  <div class="logo"><i class="fas fa-star"></i><span>StarView</span></div>
  <div class="top-right">
    <div class="pill" id="search-toggle-btn"><i class="fas fa-magnifying-glass"></i><span>ค้นหา</span></div>
    <a href="https://koomean.github.io/koomean/" target="_blank" rel="noopener noreferrer" class="pill">
      <i class="fas fa-house"></i><span>Koo Mean SITE</span>
    </a>
  </div>
</div>

<!-- search -->
<div class="search-wrap" id="search-wrap">
  <input class="search-input" id="search-input" placeholder="ค้นหาดาว เช่น Sirius, Vega…">
  <div class="search-results" id="search-results"></div>
</div>

<!-- star popup -->
<div class="star-popup" id="star-popup">
  <div class="sp-name" id="sp-name">—</div>
  <div class="sp-row"><span>Magnitude</span><span class="sp-val" id="sp-mag">—</span></div>
  <div class="sp-row"><span>Altitude</span><span class="sp-val" id="sp-alt">—</span></div>
  <div class="sp-row"><span>Azimuth</span><span class="sp-val" id="sp-az">—</span></div>
  <div class="sp-row"><span>Const.</span><span class="sp-val" id="sp-con">—</span></div>
</div>

<!-- bottom bar -->
<div class="bottom-bar">
  <div class="time-display">
    <div class="clock" id="clock-display">00:00:00</div>
    <div class="date-loc" id="date-loc-display">Loading location…</div>
  </div>
  <div class="controls">
    <button class="ctrl-btn active" id="btn-const" title="Constellation lines"><i class="fas fa-draw-polygon"></i></button>
    <button class="ctrl-btn active" id="btn-names" title="Star names"><i class="fas fa-tag"></i></button>
    <button class="ctrl-btn" id="btn-grid"  title="Coordinate grid"><i class="fas fa-table-cells"></i></button>
    <button class="ctrl-btn" id="btn-loc"   title="Set location"><i class="fas fa-location-dot"></i></button>
    <button class="ctrl-btn" id="btn-now"   title="Return to now"><i class="fas fa-rotate-right"></i></button>
  </div>
</div>

<!-- legend -->
<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#cce8ff;width:10px;height:10px"></div> Blue-white</div>
  <div class="leg-item"><div class="leg-dot" style="background:#fff;width:8px;height:8px"></div> White</div>
  <div class="leg-item"><div class="leg-dot" style="background:#fff8b0;width:7px;height:7px"></div> Yellow</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ffb347;width:6px;height:6px"></div> Orange</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ff7050;width:5px;height:5px"></div> Red</div>
</div>

<!-- location dialog -->
<div class="loc-overlay" id="loc-overlay" style="display:none">
  <div class="loc-box">
    <h3><i class="fas fa-location-dot" style="margin-right:7px"></i>ตั้งค่าตำแหน่ง</h3>
    <p>กรอกพิกัดตำแหน่งของคุณ หรือกด "ตรวจจับอัตโนมัติ"</p>
    <div class="loc-input-row">
      <div><label>Latitude (°N)</label><input type="number" id="inp-lat" step="0.01" min="-90" max="90" placeholder="13.75"></div>
      <div><label>Longitude (°E)</label><input type="number" id="inp-lon" step="0.01" min="-180" max="180" placeholder="100.50"></div>
    </div>
    <div class="loc-btns">
      <button class="loc-btn secondary" id="btn-detect"><i class="fas fa-crosshairs" style="margin-right:5px"></i>ตรวจจับ GPS</button>
      <button class="loc-btn primary" id="btn-save-loc">บันทึก</button>
    </div>
  </div>
</div>

// Build lookup: star index → constellation name

// ════════════════════════════════════════════════════════════════
// § 3 · ASTRONOMICAL CALCULATIONS
// ════════════════════════════════════════════════════════════════

const D2R = Math.PI / 180;
const R2D = 180 / Math.PI;

function julianDate(date) {
  const a = Math.floor((14 - date.getUTCMonth()) / 12);
  const y = date.getUTCFullYear() + 4800 - a;
  const m = date.getUTCMonth() + 1 + 12 * a - 3;
  const jdn = date.getUTCDate()
    + Math.floor((153 * m + 2) / 5)
    + 365 * y + Math.floor(y / 4)
    - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
  const jd = jdn + (date.getUTCHours() - 12) / 24
    + date.getUTCMinutes() / 1440
    + date.getUTCSeconds() / 86400;
  return jd;
}

function gmst(jd) {
  const T = (jd - 2451545.0) / 36525;
  let θ = 280.46061837 + 360.98564736629 * (jd - 2451545)
    + T * T * 0.000387933 - T * T * T / 38710000;
  return ((θ % 360) + 360) % 360; // degrees
}

/** Convert RA/Dec (degrees) → Altitude/Azimuth (degrees) */
function equatorialToHorizon(ra, dec, lst, lat) {
  const ha = ((lst - ra) % 360 + 360) % 360; // Hour Angle in degrees
  const haR  = ha  * D2R;
  const decR = dec * D2R;
  const latR = lat * D2R;

  const sinAlt = Math.sin(decR) * Math.sin(latR) + Math.cos(decR) * Math.cos(latR) * Math.cos(haR);
  const alt = Math.asin(Math.max(-1, Math.min(1, sinAlt))) * R2D;

  const cosAz  = (Math.sin(decR) - Math.sin(alt * D2R) * Math.sin(latR)) /
                 (Math.cos(alt * D2R) * Math.cos(latR));
  let az = Math.acos(Math.max(-1, Math.min(1, cosAz))) * R2D;
  if (Math.sin(haR) > 0) az = 360 - az;

  return { alt, az };
}

/** Project alt/az to canvas XY using azimuthal equidistant projection */
function project(alt, az, cx, cy, scale) {
  if (alt < -5) return null; // below horizon (allow slight clip)
  const r = (90 - alt) / 90 * scale;
  const azR = az * D2R;
  // North up, East left (looking up convention)
  const x = cx - r * Math.sin(azR);
  const y = cy - r * Math.cos(azR);
  return { x, y };
}

/** Star magnitude → radius in pixels */
function magToRadius(mag, zoom) {
  const base = Math.max(0.6, 3.8 - mag * 0.65);
  return base * zoom;
}

/** BV color index → CSS color */
function bvToColor(bv) {
  if (bv < -0.1) return '#b8d4ff'; // hot blue
  if (bv <  0.1) return '#d8e8ff'; // blue-white
  if (bv <  0.3) return '#ffffff'; // white
  if (bv <  0.6) return '#fffde0'; // yellow-white
  if (bv <  1.0) return '#ffe080'; // yellow
  if (bv <  1.5) return '#ffb347'; // orange
  return '#ff7050';                // red
}

// ════════════════════════════════════════════════════════════════
// § 4 · APP STATE
// ════════════════════════════════════════════════════════════════

const app = {
  lat: 13.75,
  lon: 100.50,
  zoom: 1.0,        // 1 = default, higher = zoomed in
  viewTime: null,   // null = live
  showConst: true,
  showNames: true,
  showGrid : false,
  // Computed per frame
  computed: [],     // [{x, y, alt, az, ...starData}]
  // Interaction
  drag: { active: false, x0: 0, y0: 0, viewAz0: 0, viewAlt0: 0 },
  viewAz:  0,  // offset in degrees (panning)
  viewAlt: 0,
  highlightIdx: -1,
};

// ════════════════════════════════════════════════════════════════
// § 5 · CANVAS + RENDERING
// ════════════════════════════════════════════════════════════════

const canvas  = document.getElementById('sky');
const ctx     = canvas.getContext('2d');
let W = 0, H = 0, CX = 0, CY = 0, SCALE = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2; CY = H / 2;
  SCALE = Math.min(W, H) * 0.45 * app.zoom;
}
window.addEventListener('resize', () => { resize(); draw(); });
resize();

function draw() {
  SCALE = Math.min(W, H) * 0.45 * app.zoom;
  const now = app.viewTime || new Date();
  const jd  = julianDate(now);
  const lst = ((gmst(jd) + app.lon) % 360 + 360) % 360; // degrees

  ctx.clearRect(0, 0, W, H);

  // ── Sky gradient ──
  const sky = ctx.createRadialGradient(CX, CY, 0, CX, CY, SCALE * 1.1);
  sky.addColorStop(0,   '#0a0f1e');
  sky.addColorStop(0.7, '#060b18');
  sky.addColorStop(1,   '#000000');
  ctx.fillStyle = sky;
  ctx.beginPath();
  ctx.arc(CX, CY, SCALE * 1.08, 0, Math.PI * 2);
  ctx.fill();

  // ── Milky Way (approximate arc) ──
  drawMilkyWay();

  // ── Grid ──
  if (app.showGrid) drawGrid(lst);

  // ── Constellation lines ──
  if (app.showConst) drawConstellationLines(lst);

  // ── Stars ──
  app.computed = [];
  for (let i = 0; i < STARS.length; i++) {
    const [raH, dec, mag, bv, name, con] = STARS[i];
    // Skip duplicates (Alpheratz in Pegasus section, index 69)
    if (i === 69 || i === 117) continue;
    const ra = raH * 15; // convert to degrees
    const { alt, az } = equatorialToHorizon(ra, dec, lst, app.lat);
    const adjAlt = alt + app.viewAlt;
    const adjAz  = ((az  + app.viewAz) % 360 + 360) % 360;
    const pos = project(adjAlt, adjAz, CX, CY, SCALE);
    if (!pos) continue;

    app.computed.push({ i, x: pos.x, y: pos.y, alt, az, mag, bv, name, con: con||starConst[i]||'' });
  }

  // Sort by magnitude (dim first, bright on top)
  app.computed.sort((a, b) => b.mag - a.mag);

  app.computed.forEach(s => {
    const r = magToRadius(s.mag, app.zoom * 0.8);
    const color = bvToColor(s.bv);
    const isHl  = s.i === app.highlightIdx;

    // Glow for bright stars
    if (s.mag < 2) {
      const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r * 5);
      g.addColorStop(0, color.replace(')', ',0.3)').replace('rgb(', 'rgba('));
      const c = hexToRgba(color, s.mag < 0 ? 0.4 : 0.2);
      g.addColorStop(0, c);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(s.x, s.y, r * 5, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    }

    // Highlight ring
    if (isHl) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, r * 4 + 3, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(126,200,227,0.7)';
      ctx.lineWidth   = 1.5;
      ctx.stroke();
    }

    // Star disc
    ctx.beginPath();
    ctx.arc(s.x, s.y, Math.max(0.5, r), 0, Math.PI * 2);
    ctx.fillStyle = isHl ? '#7ec8e3' : color;
    ctx.fill();

    // Name labels
    if (app.showNames && s.name && s.mag <= 1.8) {
      ctx.fillStyle = 'rgba(200,220,255,0.65)';
      ctx.font       = `${10 + (1.5 - s.mag) * 0.8}px -apple-system,sans-serif`;
      ctx.textAlign  = 'left';
      ctx.fillText(s.name, s.x + r + 4, s.y + 4);
    }
  });

  // ── Constellation labels ──
  if (app.showConst) drawConstellationLabels(lst);

  // ── Horizon ring ──
  drawHorizon();
}

function hexToRgba(hex, a) {
  // hex can be '#rrggbb' or named CSS colors — for named, return fallback
  if (!hex.startsWith('#')) return `rgba(200,220,255,${a})`;
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawMilkyWay() {
  // Simplified Milky Way band as a gradient arc
  ctx.save();
  ctx.globalAlpha = 0.07;
  const grad = ctx.createLinearGradient(CX - SCALE * 0.5, CY - SCALE, CX + SCALE * 0.5, CY + SCALE);
  grad.addColorStop(0, 'rgba(180,200,255,0)');
  grad.addColorStop(0.5, 'rgba(180,200,255,1)');
  grad.addColorStop(1, 'rgba(180,200,255,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(CX, CY, SCALE * 0.25, SCALE * 1.05, Math.PI / 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function getStarXY(idx, lst) {
  if (idx >= STARS.length) return null;
  const [raH, dec] = STARS[idx];
  const ra = raH * 15;
  const { alt, az } = equatorialToHorizon(ra, dec, lst, app.lat);
  const adjAlt = alt + app.viewAlt;
  const adjAz  = ((az + app.viewAz) % 360 + 360) % 360;
  return project(adjAlt, adjAz, CX, CY, SCALE);
}

function drawConstellationLines(lst) {
  ctx.save();
  ctx.strokeStyle = 'rgba(100,160,220,0.28)';
  ctx.lineWidth   = 0.8;
  CONSTELLATIONS.forEach(c => {
    c.lines.forEach(([a, b]) => {
      const pa = getStarXY(a, lst);
      const pb = getStarXY(b, lst);
      if (!pa || !pb) return;
      // Don't draw very long lines (wrapping artifacts)
      const dist = Math.hypot(pa.x - pb.x, pa.y - pb.y);
      if (dist > SCALE * 0.9) return;
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
    });
  });
  ctx.restore();
}

function drawConstellationLabels(lst) {
  ctx.save();
  ctx.fillStyle = 'rgba(100,160,220,0.4)';
  ctx.font      = '10px -apple-system,sans-serif';
  ctx.textAlign = 'center';
  CONSTELLATIONS.forEach(c => {
    const ra = c.lr * 15;
    const { alt, az } = equatorialToHorizon(ra, c.ld, lst, app.lat);
    const adjAlt = alt + app.viewAlt;
    const adjAz  = ((az + app.viewAz) % 360 + 360) % 360;
    const pos = project(adjAlt, adjAz, CX, CY, SCALE);
    if (!pos) return;
    ctx.fillText(c.name, pos.x, pos.y);
  });
  ctx.restore();
}

function drawGrid(lst) {
  // Draw altitude circles
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth   = 0.5;
  for (let alt = 0; alt <= 90; alt += 30) {
    const r = (90 - alt) / 90 * SCALE;
    ctx.beginPath();
    ctx.arc(CX, CY, r, 0, Math.PI * 2);
    ctx.stroke();
  }
  // Draw azimuth lines
  for (let az = 0; az < 360; az += 45) {
    const r  = SCALE;
    const azR = az * D2R;
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.lineTo(CX - r * Math.sin(azR), CY - r * Math.cos(azR));
    ctx.stroke();
  }
  ctx.restore();
}

function drawHorizon() {
  // Outer mask (below horizon = dark)
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.0)';
  ctx.beginPath();
  ctx.arc(CX, CY, SCALE, 0, Math.PI * 2);
  ctx.rect(0, 0, W, H);
  ctx.fillStyle = 'rgba(0,5,10,0.0)';

  // Horizon circle
  ctx.strokeStyle = 'rgba(80,140,200,0.45)';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.arc(CX, CY, SCALE, 0, Math.PI * 2);
  ctx.stroke();

  // Cardinal direction labels
  const dirs = [['N', 0], ['NE', 45], ['E', 90], ['SE', 135],
                ['S', 180], ['SW', 225], ['W', 270], ['NW', 315]];
  dirs.forEach(([label, az]) => {
    const r   = SCALE + 14;
    const azR = az * D2R;
    const x   = CX - r * Math.sin(azR);
    const y   = CY - r * Math.cos(azR);
    ctx.font      = label.length === 1 ? 'bold 13px -apple-system,sans-serif' : '10px -apple-system,sans-serif';
    ctx.fillStyle = label.length === 1 ? 'rgba(126,200,227,0.8)' : 'rgba(126,200,227,0.45)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, x, y);
  });
  ctx.restore();
}

// § 6 · CLOCK + LOCATION DISPLAY
// ════════════════════════════════════════════════════════════════

function updateClock() {
  const now  = app.viewTime || new Date();
  const t    = now.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const d    = now.toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric' });
  document.getElementById('clock-display').textContent  = t;
  document.getElementById('date-loc-display').textContent =
    `${d} · ${app.lat.toFixed(2)}°N ${app.lon.toFixed(2)}°E`;
}

// ════════════════════════════════════════════════════════════════
// § 7 · MAIN LOOP
// ════════════════════════════════════════════════════════════════

let lastSecond = -1;
function loop() {
  const s = Math.floor(Date.now() / 1000);
  if (s !== lastSecond) {
    lastSecond = s;
    draw();
    updateClock();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ════════════════════════════════════════════════════════════════
// § 8 · INTERACTION — mouse / touch
// ════════════════════════════════════════════════════════════════

// Drag to pan
canvas.addEventListener('mousedown', e => {
  app.drag = { active: true, x0: e.clientX, y0: e.clientY, az0: app.viewAz, alt0: app.viewAlt };
  canvas.classList.add('dragging');
});
canvas.addEventListener('mousemove', e => {
  if (!app.drag.active) return;
  const dx = e.clientX - app.drag.x0;
  const dy = e.clientY - app.drag.y0;
  // Convert pixel delta to degree delta
  const degPerPx = 90 / SCALE;
  app.viewAz  = app.drag.az0  - dx * degPerPx;
  app.viewAlt = Math.max(-30, Math.min(60, app.drag.alt0 + dy * degPerPx));
  draw();
});
const endDrag = () => { app.drag.active = false; canvas.classList.remove('dragging'); };
canvas.addEventListener('mouseup', endDrag);
canvas.addEventListener('mouseleave', endDrag);

// Scroll to zoom
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.91;
  app.zoom = Math.max(0.5, Math.min(8, app.zoom * factor));
  draw();
}, { passive: false });

// Touch pan + pinch
let lastTouches = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  lastTouches = e.touches;
  if (e.touches.length === 1) {
    app.drag = { active: true, x0: e.touches[0].clientX, y0: e.touches[0].clientY,
                 az0: app.viewAz, alt0: app.viewAlt };
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && app.drag.active) {
    const dx = e.touches[0].clientX - app.drag.x0;
    const dy = e.touches[0].clientY - app.drag.y0;
    const degPerPx = 90 / SCALE;
    app.viewAz  = app.drag.az0  - dx * degPerPx;
    app.viewAlt = Math.max(-30, Math.min(60, app.drag.alt0 + dy * degPerPx));
    draw();
  } else if (e.touches.length === 2 && lastTouches && lastTouches.length === 2) {
    const prev = Math.hypot(lastTouches[0].clientX - lastTouches[1].clientX,
                            lastTouches[0].clientY - lastTouches[1].clientY);
    const curr = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                            e.touches[0].clientY - e.touches[1].clientY);
    app.zoom = Math.max(0.5, Math.min(8, app.zoom * (curr / prev)));
    draw();
  }
  lastTouches = e.touches;
}, { passive: false });
canvas.addEventListener('touchend', () => { app.drag.active = false; });

// Click to select star
canvas.addEventListener('click', e => {
  const mx = e.clientX, my = e.clientY;
  let best = null, bestDist = 20;
  app.computed.forEach(s => {
    const d = Math.hypot(s.x - mx, s.y - my);
    if (d < bestDist) { bestDist = d; best = s; }
  });
  if (best) showStarPopup(best, mx, my);
  else      hideStarPopup();
});

function showStarPopup(s, mx, my) {
  app.highlightIdx = s.i;
  const el = document.getElementById('star-popup');
  document.getElementById('sp-name').textContent = s.name || `Star (mag ${s.mag})`;
  document.getElementById('sp-mag').textContent  = s.mag.toFixed(2);
  document.getElementById('sp-alt').textContent  = s.alt.toFixed(1) + '°';
  document.getElementById('sp-az').textContent   = s.az.toFixed(1) + '°';
  document.getElementById('sp-con').textContent  = s.con || '—';
  // Position popup
  const pw = 220, ph = 130;
  let px = mx + 14, py = my - ph / 2;
  if (px + pw > W) px = mx - pw - 14;
  if (py < 10) py = 10;
  if (py + ph > H - 60) py = H - 60 - ph;
  el.style.left = px + 'px';
  el.style.top  = py + 'px';
  el.classList.add('show');
  draw();
}

function hideStarPopup() {
  app.highlightIdx = -1;
  document.getElementById('star-popup').classList.remove('show');
  draw();
}

// § 9 · CONTROL BUTTONS

function toggleBtn(id, key) {
  app[key] = !app[key];
  document.getElementById(id).classList.toggle('active', app[key]);
  draw();
}

document.getElementById('btn-const').addEventListener('click', () => toggleBtn('btn-const', 'showConst'));
document.getElementById('btn-names').addEventListener('click', () => toggleBtn('btn-names', 'showNames'));
document.getElementById('btn-grid').addEventListener('click',  () => toggleBtn('btn-grid',  'showGrid'));
document.getElementById('btn-now').addEventListener('click', () => {
  app.viewTime = null;
  app.viewAz   = 0;
  app.viewAlt  = 0;
  draw();
});
document.getElementById('btn-loc').addEventListener('click', () => {
  document.getElementById('inp-lat').value = app.lat.toFixed(4);
  document.getElementById('inp-lon').value = app.lon.toFixed(4);
  document.getElementById('loc-overlay').style.display = 'flex';
});

// Location dialog
document.getElementById('btn-save-loc').addEventListener('click', () => {
  const lat = parseFloat(document.getElementById('inp-lat').value);
  const lon = parseFloat(document.getElementById('inp-lon').value);
  if (!isNaN(lat) && !isNaN(lon) && lat >= -90 && lat <= 90) {
    app.lat = lat; app.lon = lon;
    document.getElementById('loc-overlay').style.display = 'none';
    draw();
  } else {
    document.getElementById('inp-lat').style.borderColor = '#ff453a';
  }
});
document.getElementById('btn-detect').addEventListener('click', () => {
  if (!navigator.geolocation) return;
  const btn = document.getElementById('btn-detect');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:5px"></i>ตรวจจับ…';
  btn.disabled = true;
  navigator.geolocation.getCurrentPosition(pos => {
    document.getElementById('inp-lat').value = pos.coords.latitude.toFixed(4);
    document.getElementById('inp-lon').value = pos.coords.longitude.toFixed(4);
    btn.innerHTML = '<i class="fas fa-check" style="margin-right:5px"></i>พบตำแหน่ง';
    btn.disabled = false;
  }, () => {
    btn.innerHTML = '<i class="fas fa-crosshairs" style="margin-right:5px"></i>ตรวจจับ GPS';
    btn.disabled = false;
  });
});
document.getElementById('loc-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('loc-overlay'))
    document.getElementById('loc-overlay').style.display = 'none';
});

// § 10 · SEARCH
// ════════════════════════════════════════════════════════════════

const searchWrap   = document.getElementById('search-wrap');
const searchInput  = document.getElementById('search-input');
const searchResults= document.getElementById('search-results');

document.getElementById('search-toggle-btn').addEventListener('click', () => {
  searchWrap.classList.toggle('show');
  if (searchWrap.classList.contains('show')) searchInput.focus();
  else searchResults.innerHTML = '';
});

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  searchResults.innerHTML = '';
  if (!q) return;

  const hits = [];
  STARS.forEach((s, i) => {
    if (i === 69 || i === 117) return;
    if (s[4] && s[4].toLowerCase().includes(q)) hits.push({ i, s });
  });
  hits.sort((a, b) => a.s[2] - b.s[2]); // sort by magnitude
  hits.slice(0, 8).forEach(({ i, s }) => {
    const item = document.createElement('div');
    item.className = 'search-result-item';
    const nameEl = document.createElement('span');
    nameEl.textContent = s[4];
    const magEl = document.createElement('span');
    magEl.className   = 'sr-mag';
    magEl.textContent = `mag ${s[2].toFixed(2)}  ·  ${s[5] || ''}`;
    item.appendChild(nameEl);
    item.appendChild(magEl);
    item.addEventListener('click', () => {
      // Find this star in computed list and highlight
      const found = app.computed.find(c => c.i === i);
      if (found) {
        showStarPopup(found, found.x, found.y);
      } else {
        // Star below horizon
        hideStarPopup();
        alert(`${s[4]} อยู่ใต้ขอบฟ้าในขณะนี้`);
      }
      searchWrap.classList.remove('show');
      searchResults.innerHTML = '';
      searchInput.value = '';
    });
    searchResults.appendChild(item);
  });
});

// Close search on outside click
document.addEventListener('click', e => {
  if (!searchWrap.contains(e.target) && !document.getElementById('search-toggle-btn').contains(e.target)) {
    searchWrap.classList.remove('show');
    searchResults.innerHTML = '';
  }
});

// ════════════════════════════════════════════════════════════════
// § 11 · AUTO-DETECT LOCATION ON LOAD
// ════════════════════════════════════════════════════════════════

navigator.geolocation?.getCurrentPosition(pos => {
  app.lat = pos.coords.latitude;
  app.lon = pos.coords.longitude;
  draw(); updateClock();
}, () => {});  // silently fall back to Bangkok default

</script>
</body>
</html>
