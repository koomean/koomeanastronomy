<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>StarView — koomean</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif}
canvas{display:block;cursor:grab;position:fixed;inset:0}
canvas.dragging{cursor:grabbing}

/* ── loading overlay ── */
.loader{position:fixed;inset:0;background:#000;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .6s}
.loader.hide{opacity:0;pointer-events:none}
.loader-icon{font-size:3rem;color:#7ec8e3;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(.9)}50%{opacity:1;transform:scale(1)}}
.loader-title{color:#fff;font-size:1.3rem;font-weight:700;letter-spacing:1px}
.loader-sub{color:rgba(255,255,255,.45);font-size:.82rem}
.progress-bar{width:240px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#2a6b8a,#7ec8e3);border-radius:2px;transition:width .2s}
.loader-count{color:rgba(255,255,255,.4);font-size:.75rem;font-variant-numeric:tabular-nums}

/* ── top bar ── */
.top-bar{position:fixed;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:linear-gradient(to bottom,rgba(0,0,0,.72),transparent);z-index:50;pointer-events:none}
.top-bar>*{pointer-events:all}
.logo{display:flex;align-items:center;gap:8px;color:#fff;font-size:1rem;font-weight:700;letter-spacing:.5px}
.logo i{color:#7ec8e3}
.top-right{display:flex;align-items:center;gap:8px}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:50px;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.42);backdrop-filter:blur(12px);color:rgba(255,255,255,.78);font-size:.78rem;font-weight:600;text-decoration:none;cursor:pointer;transition:all .2s;white-space:nowrap;outline:none}
.pill:hover{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.35)}
.pill i{font-size:.78rem}

/* ── bottom bar ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 14px 18px;background:linear-gradient(to top,rgba(0,0,0,.75),transparent);z-index:50;display:flex;align-items:flex-end;justify-content:space-between;pointer-events:none}
.bottom-bar>*{pointer-events:all}
.time-display{color:#fff;line-height:1.5}
.clock{font-size:1.45rem;font-weight:600;letter-spacing:1px;font-variant-numeric:tabular-nums}
.date-loc{font-size:.72rem;opacity:.55;margin-top:2px}
.star-count{font-size:.7rem;color:rgba(126,200,227,.7);margin-top:1px}
.controls{display:flex;gap:7px}
.ctrl-btn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.5);backdrop-filter:blur(8px);color:rgba(255,255,255,.7);font-size:.88rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;outline:none}
.ctrl-btn:hover{background:rgba(255,255,255,.14);color:#fff;border-color:rgba(255,255,255,.38)}
.ctrl-btn.active{background:rgba(126,200,227,.18);border-color:rgba(126,200,227,.55);color:#7ec8e3}

/* ── star popup ── */
.star-popup{position:fixed;background:rgba(4,9,20,.9);backdrop-filter:blur(18px);border:1px solid rgba(126,200,227,.28);border-radius:14px;padding:13px 17px;color:#fff;font-size:.84rem;z-index:60;max-width:210px;opacity:0;transform:translateY(6px);transition:opacity .22s,transform .22s;pointer-events:none}
.star-popup.show{opacity:1;transform:translateY(0)}
.sp-name{font-size:1rem;font-weight:700;color:#7ec8e3;margin-bottom:7px;word-break:break-word}
.sp-row{display:flex;justify-content:space-between;gap:10px;color:rgba(255,255,255,.6);font-size:.76rem;margin-top:4px}
.sp-row .sp-val{color:#fff;font-weight:500}

/* ── search ── */
.search-wrap{position:fixed;top:62px;left:50%;transform:translateX(-50%);z-index:60;width:92%;max-width:310px;display:none}
.search-wrap.show{display:block}
.search-input{width:100%;background:rgba(4,9,20,.94);backdrop-filter:blur(18px);border:1px solid rgba(126,200,227,.3);border-radius:12px;padding:11px 15px;color:#fff;font-size:.92rem;font-family:inherit;outline:none;transition:border-color .2s}
.search-input:focus{border-color:rgba(126,200,227,.6)}
.search-input::placeholder{color:rgba(255,255,255,.3)}
.search-results{background:rgba(4,9,20,.96);border:1px solid rgba(255,255,255,.08);border-radius:10px;margin-top:5px;overflow:hidden;max-height:230px;overflow-y:auto}
.search-results::-webkit-scrollbar{width:4px}
.search-results::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:4px}
.sr-item{padding:9px 15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.05);transition:background .15s}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:rgba(126,200,227,.1)}
.sr-item-name{font-size:.88rem;color:rgba(255,255,255,.85)}
.sr-item-meta{font-size:.72rem;color:rgba(255,255,255,.38)}

/* ── mag filter ── */
.mag-wrap{position:fixed;left:14px;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;align-items:center;gap:8px}
.mag-label{color:rgba(255,255,255,.45);font-size:.7rem;writing-mode:horizontal-tb}
input[type=range].mag-slider{-webkit-appearance:none;appearance:none;writing-mode:vertical-lr;direction:rtl;width:5px;height:130px;background:rgba(255,255,255,.12);border-radius:3px;outline:none;cursor:pointer}
input[type=range].mag-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#7ec8e3;border:2px solid rgba(255,255,255,.5)}
.mag-val{color:#7ec8e3;font-size:.72rem;font-weight:700}

/* ── location dialog ── */
.loc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.loc-box{background:#0d1420;border:1px solid rgba(126,200,227,.22);border-radius:20px;padding:26px;width:90%;max-width:340px;color:#fff}
.loc-box h3{font-size:1.05rem;margin-bottom:3px;color:#7ec8e3}
.loc-box p{font-size:.78rem;color:rgba(255,255,255,.45);margin-bottom:18px}
.loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
.loc-grid label{font-size:.72rem;color:rgba(255,255,255,.5);margin-bottom:3px;display:block}
.loc-grid input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 11px;color:#fff;font-size:.88rem;outline:none;transition:border-color .2s;font-family:inherit}
.loc-grid input:focus{border-color:rgba(126,200,227,.5)}
.loc-btns{display:flex;gap:9px}
.loc-btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:.86rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.loc-btn.primary{background:linear-gradient(135deg,#2a6b8a,#3d9abf);color:#fff}
.loc-btn.secondary{background:rgba(255,255,255,.07);color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.1)}
.loc-btn:hover{filter:brightness(1.15)}

/* ── legend ── */
.legend{position:fixed;right:12px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.45);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:11px 12px;z-index:50;display:flex;flex-direction:column;gap:7px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:.68rem;color:rgba(255,255,255,.5)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── error toast ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(255,70,70,.9);backdrop-filter:blur(10px);color:#fff;padding:10px 20px;border-radius:50px;font-size:.84rem;font-weight:600;z-index:200;opacity:0;transition:all .3s;pointer-events:none;text-align:center;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:480px){.logo span{display:none}.legend{display:none}.mag-wrap{display:none}}
</style>
</head>
<body>

<canvas id="sky"></canvas>

<!-- Loading overlay -->
<div class="loader" id="loader">
  <div class="loader-icon"><i class="fas fa-star"></i></div>
  <div class="loader-title">StarView</div>
  <div class="loader-sub" id="loader-sub">กำลังโหลดแคตตาล็อกดาว…</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="loader-count" id="loader-count">0 / ~119,000</div>
</div>

<!-- Top bar -->
<div class="top-bar">
  <div class="logo"><i class="fas fa-star-and-crescent"></i><span>StarView</span></div>
  <div class="top-right">
    <div class="pill" id="search-toggle"><i class="fas fa-magnifying-glass"></i><span>ค้นหาดาว</span></div>
    <a href="https://koomean.github.io/koomean/" target="_blank" rel="noopener noreferrer" class="pill">
      <i class="fas fa-house"></i><span>Koo Mean SITE</span>
    </a>
  </div>
</div>

<!-- Search -->
<div class="search-wrap" id="search-wrap">
  <input class="search-input" id="search-input" placeholder="เช่น Sirius, Orion, Arcturus…" autocomplete="off">
  <div class="search-results" id="search-results"></div>
</div>

<!-- Star popup -->
<div class="star-popup" id="star-popup">
  <div class="sp-name" id="sp-name"></div>
  <div class="sp-row"><span>Magnitude</span><span class="sp-val" id="sp-mag"></span></div>
  <div class="sp-row"><span>Altitude</span><span class="sp-val" id="sp-alt"></span></div>
  <div class="sp-row"><span>Azimuth</span><span class="sp-val" id="sp-az"></span></div>
  <div class="sp-row"><span>RA / Dec</span><span class="sp-val" id="sp-radec"></span></div>
  <div class="sp-row"><span>Constellation</span><span class="sp-val" id="sp-con"></span></div>
  <div class="sp-row"><span>Spectral</span><span class="sp-val" id="sp-spect"></span></div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
  <div class="time-display">
    <div class="clock" id="clock-display">--:--:--</div>
    <div class="date-loc" id="date-loc"></div>
    <div class="star-count" id="star-count"></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn active" id="btn-const" title="เส้นกลุ่มดาว"><i class="fas fa-draw-polygon"></i></button>
    <button class="ctrl-btn active" id="btn-names" title="ชื่อดาว"><i class="fas fa-tag"></i></button>
    <button class="ctrl-btn" id="btn-grid" title="ตาราง alt/az"><i class="fas fa-border-all"></i></button>
    <button class="ctrl-btn" id="btn-mw" title="ทางช้างเผือก"><i class="fas fa-cloud"></i></button>
    <button class="ctrl-btn" id="btn-loc" title="ตั้งค่าตำแหน่ง"><i class="fas fa-location-dot"></i></button>
    <button class="ctrl-btn" id="btn-now" title="กลับสู่ปัจจุบัน"><i class="fas fa-rotate-right"></i></button>
  </div>
</div>

<!-- Magnitude slider -->
<div class="mag-wrap">
  <div class="mag-label">Mag</div>
  <input type="range" class="mag-slider" id="mag-slider" min="1" max="7" step="0.5" value="6.5">
  <div class="mag-val" id="mag-val">6.5</div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#b8d4ff;width:10px;height:10px"></div>Blue</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ddeeff;width:8px;height:8px"></div>Blue-white</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ffffff;width:7px;height:7px"></div>White</div>
  <div class="leg-item"><div class="leg-dot" style="background:#fffacc;width:6px;height:6px"></div>Yellow</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ffbb66;width:5px;height:5px"></div>Orange</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ff7055;width:4px;height:4px"></div>Red</div>
</div>

<!-- Location dialog -->
<div class="loc-overlay" id="loc-overlay" style="display:none">
  <div class="loc-box">
    <h3><i class="fas fa-location-dot" style="margin-right:7px"></i>ตั้งค่าตำแหน่ง</h3>
    <p>กรอกพิกัดหรือใช้ GPS เพื่อความแม่นยำ</p>
    <div class="loc-grid">
      <div><label>Latitude °N</label><input type="number" id="inp-lat" step="0.0001" min="-90" max="90" placeholder="13.7563"></div>
      <div><label>Longitude °E</label><input type="number" id="inp-lon" step="0.0001" min="-180" max="180" placeholder="100.5018"></div>
    </div>
    <div class="loc-btns">
      <button class="loc-btn secondary" id="btn-gps"><i class="fas fa-crosshairs" style="margin-right:5px"></i>ตรวจจับ GPS</button>
      <button class="loc-btn primary" id="btn-save-loc">บันทึก</button>
    </div>
  </div>
</div>

<!-- Error toast -->
<div class="toast" id="toast"></div>

  {id:'UMi',name:'Ursa Minor',  lr:15.0,ld:78,  lines:[[11767,77055],[77055,79822],[79822,82080],[82080,85822],[85822,75097],[75097,72607],[72607,85822]]},
  {id:'Vir',name:'Virgo',       lr:13.2,ld:-3,  lines:[[65474,61941],[61941,57380],[57380,59316],[59316,61941],[61941,63608],[63608,65474],[63608,64238]]},
];

// HIP → constellation abbrev map (built at runtime from CONST_DATA)
const hipToConst = {};
CONST_DATA.forEach(c => c.lines.forEach(([a,b]) => { hipToConst[a]=c.id; hipToConst[b]=c.id; }));

// HIP lookup for constellation lines rendering
const hipPos = new Map(); // hip → computed {x,y} updated each frame

// ════════════════════════════════════════════════════════════════
// § 2 · STAR CATALOG  (loaded from HYG database)
// ════════════════════════════════════════════════════════════════

// Each star: [ra_h, dec_deg, mag, bv, name, con_abbrev, hip, spect]
let STARS = [];

const HYG_URL = 'https://raw.githubusercontent.com/astronexus/HYG-Database/master/hygdata_v3.csv';
const CACHE_KEY    = 'starview-hyg-v3';
const CACHE_VER    = 3;
const CACHE_MAXAGE = 7 * 24 * 3600 * 1000; // 7 days

async function loadStars() {
  // Try localStorage cache first
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (raw) {
      const cached = JSON.parse(raw);
      if (cached.ver === CACHE_VER && Date.now() - cached.ts < CACHE_MAXAGE) {
        STARS = cached.data;
        setLoaderSub(`ใช้ข้อมูลที่แคชไว้ (${STARS.length.toLocaleString()} ดาว)`);
        setProgress(100);
        return;
      }
    }
  } catch { /* ignore */ }

  // Fetch from GitHub
  setLoaderSub('กำลังดาวน์โหลดจาก HYG Database…');
  try {
    const resp = await fetch(HYG_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    const total   = parseInt(resp.headers.get('content-length') || '0', 10);
    let   received = 0;
    let   buffer   = '';
    let   lineNum  = 0;
    let   colMap   = null;  // column index map from header

    const stars = [];

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      received += value.byteLength;
      buffer   += decoder.decode(value, { stream: true });

      // Process all complete lines
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete last chunk

      for (const line of lines) {
        if (!line.trim()) continue;
        const cols = line.split(',');

        if (lineNum === 0) {
          // Parse header to get column indices (robust against future format changes)
          colMap = {};
          cols.forEach((c, i) => { colMap[c.trim()] = i; });
          lineNum++;
          continue;
        }
        lineNum++;

        const mag = parseFloat(cols[colMap['mag']]);
        if (isNaN(mag) || mag > 7.0) continue; // skip dim & invalid

        const hip   = parseInt(cols[colMap['hip']]) || 0;
        const ra    = parseFloat(cols[colMap['ra']]);
        const dec   = parseFloat(cols[colMap['dec']]);
        if (isNaN(ra) || isNaN(dec)) continue;

        const bv    = parseFloat(cols[colMap['ci']])    || 0;
        const name  = (cols[colMap['proper']] || '').trim();
        const con   = (cols[colMap['con']]    || '').trim();
        const spect = (cols[colMap['spect']]  || '').trim().slice(0, 4);

        stars.push([ra, dec, mag, bv, name, con, hip, spect]);
      }

      // Progress
      if (total > 0) {
        setProgress(Math.round(received / total * 90));
        setLoaderCount(`${stars.length.toLocaleString()} ดาว (${Math.round(received/1024)}KB)`);
      } else {
        setLoaderCount(`${stars.length.toLocaleString()} ดาว…`);
      }
    }

    // Handle remaining buffer
    if (buffer.trim() && colMap) {
      const cols = buffer.split(',');
      const mag  = parseFloat(cols[colMap['mag']]);
      if (!isNaN(mag) && mag <= 7.0) {
        const ra   = parseFloat(cols[colMap['ra']]);
        const dec  = parseFloat(cols[colMap['dec']]);
        if (!isNaN(ra) && !isNaN(dec)) {
          stars.push([ra, dec, mag,
            parseFloat(cols[colMap['ci']]) || 0,
            (cols[colMap['proper']] || '').trim(),
            (cols[colMap['con']] || '').trim(),
            parseInt(cols[colMap['hip']]) || 0,
            (cols[colMap['spect']] || '').trim().slice(0,4)
          ]);
        }
      }
    }

    setProgress(95);
    setLoaderSub(`บันทึก ${stars.length.toLocaleString()} ดาวลง cache…`);
    STARS = stars;

    // Cache to localStorage
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({ ver: CACHE_VER, ts: Date.now(), data: stars }));
    } catch (e) {
      // localStorage full – still works without cache
      console.warn('Cache write failed:', e.message);
    }

    setProgress(100);

  } catch (err) {
    console.error('loadStars:', err);
    showToast('โหลดข้อมูลไม่สำเร็จ – ตรวจสอบอินเทอร์เน็ต');
    // Fall back to empty catalog – app still runs
    STARS = [];
  }
}

// ════════════════════════════════════════════════════════════════
// § 4 · ASTRONOMY ENGINE
// ════════════════════════════════════════════════════════════════

const D2R = Math.PI / 180;
const R2D = 180 / Math.PI;

function julianDate(d) {
  const a = Math.floor((14 - d.getUTCMonth()) / 12);
  const y = d.getUTCFullYear() + 4800 - a;
  const m = d.getUTCMonth() + 1 + 12 * a - 3;
  const jdn = d.getUTCDate()
    + Math.floor((153 * m + 2) / 5)
    + 365 * y + Math.floor(y / 4)
    - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
  return jdn + (d.getUTCHours() - 12) / 24
       + d.getUTCMinutes() / 1440
       + d.getUTCSeconds() / 86400;
}

function gmst(jd) {
  const T = (jd - 2451545) / 36525;
  const θ = 280.46061837 + 360.98564736629 * (jd - 2451545)
    + T * T * 0.000387933 - T * T * T / 38710000;
  return ((θ % 360) + 360) % 360;
}

function toHorizon(raH, dec, lst, lat) {
  const ha = ((lst - raH * 15) % 360 + 360) % 360;
  const haR = ha * D2R, dR = dec * D2R, lR = lat * D2R;
  const sA = Math.sin(dR) * Math.sin(lR) + Math.cos(dR) * Math.cos(lR) * Math.cos(haR);
  const alt = Math.asin(Math.max(-1, Math.min(1, sA))) * R2D;
  const cAz = (Math.sin(dR) - Math.sin(alt * D2R) * Math.sin(lR)) /
              (Math.cos(alt * D2R) * Math.cos(lR));
  let az = Math.acos(Math.max(-1, Math.min(1, cAz))) * R2D;
  if (Math.sin(haR) > 0) az = 360 - az;
  return { alt, az };
}

function project(alt, az) {
  if (alt < -2) return null;
  const r    = (90 - alt) / 90 * SCALE;
  const adjAz = ((az + app.viewAz) % 360 + 360) % 360;
  const azR  = adjAz * D2R;
  return {
    x: CX - r * Math.sin(azR),
    y: CY - r * Math.cos(azR),
  };
}

function magToRadius(mag) {
  return Math.max(0.5, (3.5 - mag * 0.5) * Math.min(app.zoom, 2.5));
}

function bvToColor(bv) {
  if (bv < -0.3) return '#9db8ff'; // hot O
  if (bv < -0.1) return '#b8d4ff'; // B
  if (bv <  0.1) return '#ddeeff'; // A
  if (bv <  0.3) return '#ffffff'; // F
  if (bv <  0.6) return '#fffacc'; // G yellow-white
  if (bv <  1.0) return '#ffe080'; // K yellow
  if (bv <  1.5) return '#ffbb66'; // K/M orange
  return '#ff7055';                // M red
}

// ════════════════════════════════════════════════════════════════
// § 5 · APP STATE
// ════════════════════════════════════════════════════════════════

const app = {
  lat: 13.7563, lon: 100.5018,
  zoom: 1.0,
  viewAz: 0, viewAlt: 0,
  magLimit: 6.5,
  showConst: true, showNames: true,
  showGrid: false, showMW: true,
  drag: { active: false, x0: 0, y0: 0, az0: 0, alt0: 0 },
  computed: [],   // visible stars this frame
  highlightHip: -1,
};

// ════════════════════════════════════════════════════════════════
// § 6 · CANVAS
// ════════════════════════════════════════════════════════════════

const canvas = document.getElementById('sky');
const ctx    = canvas.getContext('2d');
let W, H, CX, CY, SCALE;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2; CY = H / 2;
  SCALE = Math.min(W, H) * 0.44 * app.zoom;
}
window.addEventListener('resize', () => { resize(); draw(); });
resize();

// ════════════════════════════════════════════════════════════════
// § 7 · DRAW
// ════════════════════════════════════════════════════════════════

function draw() {
  SCALE = Math.min(W, H) * 0.44 * app.zoom;
  const now = new Date();
  const jd  = julianDate(now);
  const lst = ((gmst(jd) + app.lon) % 360 + 360) % 360;

  ctx.clearRect(0, 0, W, H);

  // Sky dome
  const sky = ctx.createRadialGradient(CX, CY, 0, CX, CY, SCALE * 1.1);
  sky.addColorStop(0,   '#0b1028');
  sky.addColorStop(0.6, '#060c1c');
  sky.addColorStop(1,   '#020408');
  ctx.beginPath();
  ctx.arc(CX, CY, SCALE * 1.06, 0, Math.PI * 2);
  ctx.fillStyle = sky;
  ctx.fill();

  if (app.showMW) drawMilkyWay();
  if (app.showGrid) drawAltAzGrid();
  if (app.showConst) drawConstLines(lst);

  // Compute star positions
  app.computed = [];
  hipPos.clear();

  for (let i = 0; i < STARS.length; i++) {
    const [raH, dec, mag, bv, name, con, hip, spect] = STARS[i];
    if (mag > app.magLimit) continue;

    const { alt, az } = toHorizon(raH, dec, lst, app.lat);
    const adjAlt = alt + app.viewAlt;
    const pos    = project(adjAlt, az);
    if (!pos) continue;

    // Store HIP position for constellation lines
    if (hip) hipPos.set(hip, pos);

    app.computed.push({ idx: i, x: pos.x, y: pos.y, alt, az, mag, bv, name, con, hip, spect });
  }

  // Sort: dim first, bright on top
  app.computed.sort((a, b) => b.mag - a.mag);

  // Draw stars
  for (const s of app.computed) {
    const r     = magToRadius(s.mag);
    const color = bvToColor(s.bv);
    const isHl  = s.hip === app.highlightHip && s.hip > 0;

    // Glow for bright stars (mag < 2.5)
    if (s.mag < 2.5) {
      const gr = r * (5 - s.mag);
      const g  = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, gr);
      g.addColorStop(0, colorWithAlpha(color, 0.35));
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(s.x, s.y, gr, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    }

    // Highlight ring
    if (isHl) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, r * 4 + 4, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(126,200,227,.75)';
      ctx.lineWidth   = 1.5;
      ctx.stroke();
    }

    // Star disc
    ctx.beginPath();
    ctx.arc(s.x, s.y, Math.max(0.4, r), 0, Math.PI * 2);
    ctx.fillStyle = isHl ? '#7ec8e3' : color;
    ctx.fill();

    // Name label
    if (app.showNames && s.name && s.mag <= 2.0) {
      ctx.font      = `${Math.round(10 + (2 - s.mag) * 1.5)}px -apple-system,sans-serif`;
      ctx.fillStyle = 'rgba(190,215,255,0.7)';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(s.name, s.x + r + 4, s.y + 1);
    }
  }

  // Constellation labels
  if (app.showConst) drawConstLabels(lst);

  drawHorizon();
  updateHUD();
}

function colorWithAlpha(hex, a) {
  if (!hex.startsWith('#')) return `rgba(200,220,255,${a})`;
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

// ── Milky Way ──
function drawMilkyWay() {
  ctx.save();
  ctx.globalAlpha = 0.08;
  // Draw as elliptical band at ~60° tilt
  const g = ctx.createLinearGradient(CX - SCALE * 0.4, CY - SCALE, CX + SCALE * 0.4, CY + SCALE);
  g.addColorStop(0,   'rgba(160,185,255,0)');
  g.addColorStop(0.4, 'rgba(160,185,255,1)');
  g.addColorStop(0.6, 'rgba(160,185,255,1)');
  g.addColorStop(1,   'rgba(160,185,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(CX, CY, SCALE * 0.22, SCALE * 1.02, Math.PI * 0.32, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ── Alt/Az Grid ──
function drawAltAzGrid() {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,.06)';
  ctx.lineWidth   = 0.6;
  for (let alt = 0; alt < 90; alt += 30) {
    const r = (90 - alt) / 90 * SCALE;
    ctx.beginPath(); ctx.arc(CX, CY, r, 0, Math.PI * 2); ctx.stroke();
  }
  for (let az = 0; az < 360; az += 45) {
    const r   = SCALE;
    const adjAz = ((az + app.viewAz) % 360 + 360) % 360;
    const azR = adjAz * D2R;
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.lineTo(CX - r * Math.sin(azR), CY - r * Math.cos(azR));
    ctx.stroke();
  }
  ctx.restore();
}

// ── Constellation lines ──
function drawConstLines(lst) {
  // First pass: build positions for all HIP IDs needed by lines
  // (hipPos is populated in the star loop, but we need lines even for dim stars)
  // Build a quick hip → ra,dec map once at load (built below after STARS loads)

  ctx.save();
  ctx.strokeStyle = 'rgba(80,140,220,.25)';
  ctx.lineWidth   = 0.85;

  CONST_DATA.forEach(c => {
    c.lines.forEach(([a, b]) => {
      const pa = hipPos.get(a);
      const pb = hipPos.get(b);
      if (!pa || !pb) return;
      const dist = Math.hypot(pa.x - pb.x, pa.y - pb.y);
      if (dist > SCALE * 0.95) return; // skip wrap-around artifacts
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
    });
  });
  ctx.restore();
}

// ── Constellation labels ──
function drawConstLabels(lst) {
  ctx.save();
  ctx.font      = '10px -apple-system,sans-serif';
  ctx.fillStyle = 'rgba(90,145,220,.42)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  CONST_DATA.forEach(c => {
    const { alt, az } = toHorizon(c.lr, c.ld, ((gmst(julianDate(new Date())) + app.lon) % 360 + 360) % 360, app.lat);
    const adjAlt = alt + app.viewAlt;
    const pos = project(adjAlt, az);
    if (!pos) return;
    ctx.fillText(c.name, pos.x, pos.y);
  });
  ctx.restore();
}

// ── Horizon ──
function drawHorizon() {
  ctx.save();
  ctx.strokeStyle = 'rgba(80,150,220,.45)';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.arc(CX, CY, SCALE, 0, Math.PI * 2);
  ctx.stroke();

  // Cardinal labels
  const dirs = [['N',0],['NE',45],['E',90],['SE',135],['S',180],['SW',225],['W',270],['NW',315]];
  dirs.forEach(([lbl, az]) => {
    const adjAz = ((az + app.viewAz) % 360 + 360) % 360;
    const r = SCALE + 14;
    const x = CX - r * Math.sin(adjAz * D2R);
    const y = CY - r * Math.cos(adjAz * D2R);
    ctx.font      = lbl.length === 1 ? 'bold 13px -apple-system,sans-serif' : '10px -apple-system,sans-serif';
    ctx.fillStyle = lbl.length === 1 ? 'rgba(126,200,227,.85)' : 'rgba(126,200,227,.42)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(lbl, x, y);
  });
  ctx.restore();
}

// ── HUD ──
function updateHUD() {
  const now = new Date();
  document.getElementById('clock-display').textContent =
    now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('date-loc').textContent =
    `${now.toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric' })}  ·  ${app.lat.toFixed(2)}°N ${app.lon.toFixed(2)}°E`;
  document.getElementById('star-count').textContent =
    `${app.computed.length.toLocaleString()} ดาวมองเห็น`;
}

// ════════════════════════════════════════════════════════════════
// § 8 · MAIN LOOP
// ════════════════════════════════════════════════════════════════

let lastSec = -1;
function loop() {
  const s = Math.floor(Date.now() / 1000);
  if (s !== lastSec) { lastSec = s; draw(); }
  requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════════════════
// § 9 · INPUT — mouse / touch / wheel
// ════════════════════════════════════════════════════════════════

canvas.addEventListener('mousedown', e => {
  app.drag = { active:true, x0:e.clientX, y0:e.clientY, az0:app.viewAz, alt0:app.viewAlt };
  canvas.classList.add('dragging');
});
canvas.addEventListener('mousemove', e => {
  if (!app.drag.active) return;
  const deg = 90 / SCALE;
  app.viewAz  = app.drag.az0  - (e.clientX - app.drag.x0) * deg;
  app.viewAlt = Math.max(-30, Math.min(60, app.drag.alt0 + (e.clientY - app.drag.y0) * deg));
  draw();
});
const stopDrag = () => { app.drag.active = false; canvas.classList.remove('dragging'); };
canvas.addEventListener('mouseup', stopDrag);
canvas.addEventListener('mouseleave', stopDrag);

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  app.zoom = Math.max(0.4, Math.min(10, app.zoom * (e.deltaY < 0 ? 1.1 : 0.91)));
  draw();
}, { passive: false });

// Touch
let lastPinchDist = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    app.drag = { active:true, x0:e.touches[0].clientX, y0:e.touches[0].clientY, az0:app.viewAz, alt0:app.viewAlt };
  } else if (e.touches.length === 2) {
    lastPinchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  }
}, { passive:false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && app.drag.active) {
    const deg = 90 / SCALE;
    app.viewAz  = app.drag.az0  - (e.touches[0].clientX - app.drag.x0) * deg;
    app.viewAlt = Math.max(-30, Math.min(60, app.drag.alt0 + (e.touches[0].clientY - app.drag.y0) * deg));
    draw();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    if (lastPinchDist > 0) app.zoom = Math.max(0.4, Math.min(10, app.zoom * dist / lastPinchDist));
    lastPinchDist = dist;
    draw();
  }
}, { passive:false });
canvas.addEventListener('touchend', () => { app.drag.active = false; lastPinchDist = 0; });

// Click → select star
let clickTimer = null;
canvas.addEventListener('click', e => {
  clearTimeout(clickTimer);
  clickTimer = setTimeout(() => {
    const mx = e.clientX, my = e.clientY;
    let best = null, bestD = 22;
    app.computed.forEach(s => {
      const d = Math.hypot(s.x - mx, s.y - my);
      if (d < bestD) { bestD = d; best = s; }
    });
    if (best) showStarPopup(best, mx, my);
    else      hideStarPopup();
  }, 50);
});

function showStarPopup(s, mx, my) {
  app.highlightHip = s.hip;
  const el = document.getElementById('star-popup');
  document.getElementById('sp-name').textContent = s.name || `HIP ${s.hip}`;
  document.getElementById('sp-mag').textContent  = s.mag.toFixed(2);
  document.getElementById('sp-alt').textContent  = s.alt.toFixed(2) + '°';
  document.getElementById('sp-az').textContent   = s.az.toFixed(2) + '°';
  document.getElementById('sp-radec').textContent= `${STARS[s.idx][0].toFixed(3)}h  ${STARS[s.idx][1].toFixed(2)}°`;
  document.getElementById('sp-con').textContent  = s.con || '—';
  document.getElementById('sp-spect').textContent= s.spect || '—';

  const pw = 215, ph = 160;
  let px = mx + 14, py = my - ph / 2;
  if (px + pw > W - 10) px = mx - pw - 14;
  if (py < 60) py = 60;
  if (py + ph > H - 70) py = H - 70 - ph;
  el.style.left = px + 'px';
  el.style.top  = py + 'px';
  el.classList.add('show');
  draw();
}
function hideStarPopup() {
  app.highlightHip = -1;
  document.getElementById('star-popup').classList.remove('show');
  draw();
}

// ════════════════════════════════════════════════════════════════
// § 10 · CONTROLS
// ════════════════════════════════════════════════════════════════

function toggleCtrl(id, key) {
  app[key] = !app[key];
  document.getElementById(id).classList.toggle('active', app[key]);
  draw();
}

document.getElementById('btn-const').addEventListener('click', () => toggleCtrl('btn-const', 'showConst'));
document.getElementById('btn-names').addEventListener('click', () => toggleCtrl('btn-names', 'showNames'));
document.getElementById('btn-grid').addEventListener('click',  () => toggleCtrl('btn-grid',  'showGrid'));
document.getElementById('btn-mw').addEventListener('click',    () => toggleCtrl('btn-mw',    'showMW'));
document.getElementById('btn-now').addEventListener('click', () => {
  app.viewAz = 0; app.viewAlt = 0; app.zoom = 1.0; draw();
});
document.getElementById('btn-loc').addEventListener('click', () => {
  document.getElementById('inp-lat').value = app.lat.toFixed(4);
  document.getElementById('inp-lon').value = app.lon.toFixed(4);
  document.getElementById('loc-overlay').style.display = 'flex';
});
document.getElementById('btn-save-loc').addEventListener('click', () => {
  const lat = parseFloat(document.getElementById('inp-lat').value);
  const lon = parseFloat(document.getElementById('inp-lon').value);
  if (!isNaN(lat) && !isNaN(lon) && Math.abs(lat) <= 90 && Math.abs(lon) <= 180) {
    app.lat = lat; app.lon = lon;
    document.getElementById('loc-overlay').style.display = 'none';
    draw();
  }
});
document.getElementById('btn-gps').addEventListener('click', () => {
  const btn = document.getElementById('btn-gps');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:5px"></i>ตรวจจับ…';
  btn.disabled = true;
  navigator.geolocation?.getCurrentPosition(pos => {
    document.getElementById('inp-lat').value = pos.coords.latitude.toFixed(4);
    document.getElementById('inp-lon').value = pos.coords.longitude.toFixed(4);
    btn.innerHTML = '<i class="fas fa-check" style="margin-right:5px"></i>พบตำแหน่ง';
    btn.disabled = false;
  }, () => {
    btn.innerHTML = '<i class="fas fa-crosshairs" style="margin-right:5px"></i>ตรวจจับ GPS';
    btn.disabled = false;
    showToast('ไม่สามารถตรวจจับ GPS ได้');
  });
});
document.getElementById('loc-overlay').addEventListener('click', e => {
  if (e.target.id === 'loc-overlay')
    document.getElementById('loc-overlay').style.display = 'none';
});

// Magnitude slider
const magSlider = document.getElementById('mag-slider');
const magValEl  = document.getElementById('mag-val');
magSlider.addEventListener('input', () => {
  app.magLimit = parseFloat(magSlider.value);
  magValEl.textContent = app.magLimit.toFixed(1);
  draw();
});

// ════════════════════════════════════════════════════════════════
// § 11 · SEARCH
// ════════════════════════════════════════════════════════════════

const searchWrap   = document.getElementById('search-wrap');
const searchInput  = document.getElementById('search-input');
const searchResults= document.getElementById('search-results');

document.getElementById('search-toggle').addEventListener('click', () => {
  const show = searchWrap.classList.toggle('show');
  if (show) searchInput.focus();
  else searchResults.innerHTML = '';
});

let searchTimer = null;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const q = searchInput.value.trim().toLowerCase();
    searchResults.innerHTML = '';
    if (!q || q.length < 1) return;

    const hits = [];
    for (const s of STARS) {
      const [,, mag,,,, hip, , ] = s;
      const name = s[4];
      const con  = s[5];
      if ((name && name.toLowerCase().includes(q)) ||
          (con && con.toLowerCase() === q) ||
          (hip && String(hip) === q)) {
        hits.push(s);
        if (hits.length >= 10) break;
      }
    }
    hits.sort((a, b) => a[2] - b[2]);

    if (!hits.length) {
      const empty = document.createElement('div');
      empty.className = 'sr-item';
      empty.style.color = 'rgba(255,255,255,.35)';
      empty.style.fontSize = '.8rem';
      empty.textContent = 'ไม่พบดาวที่ตรงกัน';
      searchResults.appendChild(empty);
      return;
    }

    hits.forEach(s => {
      const item = document.createElement('div');
      item.className = 'sr-item';
      const nm = document.createElement('span');
      nm.className   = 'sr-item-name';
      nm.textContent = s[4] || `HIP ${s[6]}`;
      const mt = document.createElement('span');
      mt.className   = 'sr-item-meta';
      mt.textContent = `mag ${s[2].toFixed(2)}  ${s[5] || ''}`;
      item.appendChild(nm);
      item.appendChild(mt);
      item.addEventListener('click', () => {
        // Find in computed list
        const found = app.computed.find(c => c.hip === s[6] && s[6] > 0);
        if (found) {
          showStarPopup(found, found.x, found.y);
        } else {
          showToast(`${s[4] || 'ดาวนี้'} อยู่ใต้ขอบฟ้าในขณะนี้`);
        }
        searchWrap.classList.remove('show');
        searchResults.innerHTML = '';
        searchInput.value = '';
      });
      searchResults.appendChild(item);
    });
  }, 200);
});

document.addEventListener('click', e => {
  if (!searchWrap.contains(e.target) && !document.getElementById('search-toggle').contains(e.target)) {
    searchWrap.classList.remove('show');
  }
});

// ════════════════════════════════════════════════════════════════
// § 12 · TOAST
// ════════════════════════════════════════════════════════════════

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// ════════════════════════════════════════════════════════════════
// § 13 · INIT
// ════════════════════════════════════════════════════════════════

(async () => {
  // Try GPS silently
  navigator.geolocation?.getCurrentPosition(p => {
    app.lat = p.coords.latitude;
    app.lon = p.coords.longitude;
  }, () => {});

  await loadStars();

  setLoaderSub('กำลังเรนเดอร์ท้องฟ้า…');
  await new Promise(r => setTimeout(r, 200));

  hideLoader();
  document.getElementById('star-count').textContent = `${STARS.length.toLocaleString()} ดาวในแคตตาล็อก`;

  if (STARS.length === 0) {
    showToast('ไม่มีข้อมูลดาว – กรุณาตรวจสอบอินเทอร์เน็ต');
  }

  draw();
  requestAnimationFrame(loop);
})();

</script>
