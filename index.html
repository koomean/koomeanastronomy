<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>StarView — koomean</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif}
canvas{display:block;cursor:grab;position:fixed;inset:0}
canvas.dragging{cursor:grabbing}

/* ── loading overlay ── */
.loader{position:fixed;inset:0;background:#000;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .6s}
.loader.hide{opacity:0;pointer-events:none}
.loader-icon{font-size:3rem;color:#7ec8e3;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(.9)}50%{opacity:1;transform:scale(1)}}
.loader-title{color:#fff;font-size:1.3rem;font-weight:700;letter-spacing:1px}
.loader-sub{color:rgba(255,255,255,.45);font-size:.82rem}
.progress-bar{width:240px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#2a6b8a,#7ec8e3);border-radius:2px;transition:width .2s}
.loader-count{color:rgba(255,255,255,.4);font-size:.75rem;font-variant-numeric:tabular-nums}

/* ── top bar ── */
.top-bar{position:fixed;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:linear-gradient(to bottom,rgba(0,0,0,.72),transparent);z-index:50;pointer-events:none}
.top-bar>*{pointer-events:all}
.logo{display:flex;align-items:center;gap:8px;color:#fff;font-size:1rem;font-weight:700;letter-spacing:.5px}
.logo i{color:#7ec8e3}
.top-right{display:flex;align-items:center;gap:8px}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:50px;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.42);backdrop-filter:blur(12px);color:rgba(255,255,255,.78);font-size:.78rem;font-weight:600;text-decoration:none;cursor:pointer;transition:all .2s;white-space:nowrap;outline:none}
.pill:hover{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.35)}
.pill i{font-size:.78rem}

/* ── bottom bar ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 14px 18px;background:linear-gradient(to top,rgba(0,0,0,.75),transparent);z-index:50;display:flex;align-items:flex-end;justify-content:space-between;pointer-events:none}
.bottom-bar>*{pointer-events:all}
.time-display{color:#fff;line-height:1.5}
.clock{font-size:1.45rem;font-weight:600;letter-spacing:1px;font-variant-numeric:tabular-nums}
.date-loc{font-size:.72rem;opacity:.55;margin-top:2px}
.star-count{font-size:.7rem;color:rgba(126,200,227,.7);margin-top:1px}
.controls{display:flex;gap:7px}
.ctrl-btn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.5);backdrop-filter:blur(8px);color:rgba(255,255,255,.7);font-size:.88rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;outline:none}
.ctrl-btn:hover{background:rgba(255,255,255,.14);color:#fff;border-color:rgba(255,255,255,.38)}
.ctrl-btn.active{background:rgba(126,200,227,.18);border-color:rgba(126,200,227,.55);color:#7ec8e3}

/* ── star popup ── */
.star-popup{position:fixed;background:rgba(4,9,20,.9);backdrop-filter:blur(18px);border:1px solid rgba(126,200,227,.28);border-radius:14px;padding:13px 17px;color:#fff;font-size:.84rem;z-index:60;max-width:210px;opacity:0;transform:translateY(6px);transition:opacity .22s,transform .22s;pointer-events:none}
.star-popup.show{opacity:1;transform:translateY(0)}
.sp-name{font-size:1rem;font-weight:700;color:#7ec8e3;margin-bottom:7px;word-break:break-word}
.sp-row{display:flex;justify-content:space-between;gap:10px;color:rgba(255,255,255,.6);font-size:.76rem;margin-top:4px}
.sp-row .sp-val{color:#fff;font-weight:500}

/* ── search ── */
.search-wrap{position:fixed;top:62px;left:50%;transform:translateX(-50%);z-index:60;width:92%;max-width:310px;display:none}
.search-wrap.show{display:block}
.search-input{width:100%;background:rgba(4,9,20,.94);backdrop-filter:blur(18px);border:1px solid rgba(126,200,227,.3);border-radius:12px;padding:11px 15px;color:#fff;font-size:.92rem;font-family:inherit;outline:none;transition:border-color .2s}
.search-input:focus{border-color:rgba(126,200,227,.6)}
.search-input::placeholder{color:rgba(255,255,255,.3)}
.search-results{background:rgba(4,9,20,.96);border:1px solid rgba(255,255,255,.08);border-radius:10px;margin-top:5px;overflow:hidden;max-height:230px;overflow-y:auto}
.search-results::-webkit-scrollbar{width:4px}
.search-results::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:4px}
.sr-item{padding:9px 15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.05);transition:background .15s}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:rgba(126,200,227,.1)}
.sr-item-name{font-size:.88rem;color:rgba(255,255,255,.85)}
.sr-item-meta{font-size:.72rem;color:rgba(255,255,255,.38)}

/* ── mag filter ── */
.mag-wrap{position:fixed;left:14px;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;align-items:center;gap:8px}
.mag-label{color:rgba(255,255,255,.45);font-size:.7rem;writing-mode:horizontal-tb}
input[type=range].mag-slider{-webkit-appearance:none;appearance:none;writing-mode:vertical-lr;direction:rtl;width:5px;height:130px;background:rgba(255,255,255,.12);border-radius:3px;outline:none;cursor:pointer}
input[type=range].mag-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#7ec8e3;border:2px solid rgba(255,255,255,.5)}
.mag-val{color:#7ec8e3;font-size:.72rem;font-weight:700}

/* ── location dialog ── */
.loc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.loc-box{background:#0d1420;border:1px solid rgba(126,200,227,.22);border-radius:20px;padding:26px;width:90%;max-width:340px;color:#fff}
.loc-box h3{font-size:1.05rem;margin-bottom:3px;color:#7ec8e3}
.loc-box p{font-size:.78rem;color:rgba(255,255,255,.45);margin-bottom:18px}
.loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
.loc-grid label{font-size:.72rem;color:rgba(255,255,255,.5);margin-bottom:3px;display:block}
.loc-grid input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 11px;color:#fff;font-size:.88rem;outline:none;transition:border-color .2s;font-family:inherit}
.loc-grid input:focus{border-color:rgba(126,200,227,.5)}
.loc-btns{display:flex;gap:9px}
.loc-btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:.86rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.loc-btn.primary{background:linear-gradient(135deg,#2a6b8a,#3d9abf);color:#fff}
.loc-btn.secondary{background:rgba(255,255,255,.07);color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.1)}
.loc-btn:hover{filter:brightness(1.15)}

/* ── legend ── */
.legend{position:fixed;right:12px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.45);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:11px 12px;z-index:50;display:flex;flex-direction:column;gap:7px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:.68rem;color:rgba(255,255,255,.5)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── error toast ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(255,70,70,.9);backdrop-filter:blur(10px);color:#fff;padding:10px 20px;border-radius:50px;font-size:.84rem;font-weight:600;z-index:200;opacity:0;transition:all .3s;pointer-events:none;text-align:center;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:480px){.logo span{display:none}.legend{display:none}.mag-wrap{display:none}}
</style>
</head>
<body>

<canvas id="sky"></canvas>

<div class="loader" id="loader">
  <div class="loader-icon"><i class="fas fa-star"></i></div>
  <div class="loader-title">StarView</div>
  <div class="loader-sub" id="loader-sub">กำลังโหลดข้อมูลดวงดาว...</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="loader-count" id="loader-count">0 / ~119,000</div>
</div>

<div class="top-bar">
  <div class="logo"><i class="fas fa-star-and-crescent"></i><span>StarView</span></div>
  <div class="top-right">
    <div class="pill" id="search-toggle"><i class="fas fa-magnifying-glass"></i><span>ค้นหาดาว</span></div>
    <a href="https://koomean.github.io/koomean/" target="_blank" rel="noopener noreferrer" class="pill">
      <i class="fas fa-house"></i><span>Koo Mean SITE</span>
    </a>
  </div>
</div>

<div class="search-wrap" id="search-wrap">
  <input class="search-input" id="search-input" placeholder="เช่น Sirius, Orion, Arcturus…" autocomplete="off">
  <div class="search-results" id="search-results"></div>
</div>

<div class="star-popup" id="star-popup">
  <div class="sp-name" id="sp-name"></div>
  <div class="sp-row"><span>Magnitude</span><span class="sp-val" id="sp-mag"></span></div>
  <div class="sp-row"><span>Altitude</span><span class="sp-val" id="sp-alt"></span></div>
  <div class="sp-row"><span>Azimuth</span><span class="sp-val" id="sp-az"></span></div>
  <div class="sp-row"><span>RA / Dec</span><span class="sp-val" id="sp-radec"></span></div>
  <div class="sp-row"><span>Constellation</span><span class="sp-val" id="sp-con"></span></div>
  <div class="sp-row"><span>Spectral</span><span class="sp-val" id="sp-spect"></span></div>
</div>

<div class="bottom-bar">
  <div class="time-display">
    <div class="clock" id="clock-display">--:--:--</div>
    <div class="date-loc" id="date-loc"></div>
    <div class="star-count" id="star-count"></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn active" id="btn-const" title="เส้นกลุ่มดาว"><i class="fas fa-draw-polygon"></i></button>
    <button class="ctrl-btn active" id="btn-names" title="ชื่อดาว"><i class="fas fa-tag"></i></button>
    <button class="ctrl-btn" id="btn-grid" title="ตาราง alt/az"><i class="fas fa-border-all"></i></button>
    <button class="ctrl-btn" id="btn-mw" title="ทางช้างเผือก"><i class="fas fa-cloud"></i></button>
    <button class="ctrl-btn" id="btn-loc" title="ตั้งค่าตำแหน่ง"><i class="fas fa-location-dot"></i></button>
    <button class="ctrl-btn" id="btn-now" title="กลับสู่ปัจจุบัน"><i class="fas fa-rotate-right"></i></button>
  </div>
</div>

<div class="mag-wrap">
  <div class="mag-label">Mag</div>
  <input type="range" class="mag-slider" id="mag-slider" min="1" max="7" step="0.5" value="6.5">
  <div class="mag-val" id="mag-val">6.5</div>
</div>

<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#b8d4ff;width:10px;height:10px"></div>Blue</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ddeeff;width:8px;height:8px"></div>Blue-white</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ffffff;width:7px;height:7px"></div>White</div>
  <div class="leg-item"><div class="leg-dot" style="background:#fffacc;width:6px;height:6px"></div>Yellow</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ffbb66;width:5px;height:5px"></div>Orange</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ff7055;width:4px;height:4px"></div>Red</div>
</div>

<div class="loc-overlay" id="loc-overlay" style="display:none">
  <div class="loc-box">
    <h3><i class="fas fa-location-dot" style="margin-right:7px"></i>ตั้งค่าตำแหน่ง</h3>
    <p>กรอกพิกัดหรือใช้ GPS เพื่อความแม่นยำ</p>
    <div class="loc-grid">
      <div><label>Latitude °N</label><input type="number" id="inp-lat" step="0.0001" min="-90" max="90" placeholder="13.7563"></div>
      <div><label>Longitude °E</label><input type="number" id="inp-lon" step="0.0001" min="-180" max="180" placeholder="100.5018"></div>
    </div>
    <div class="loc-btns">
      <button class="loc-btn secondary" id="btn-gps"><i class="fas fa-crosshairs" style="margin-right:5px"></i>ตรวจจับ GPS</button>
      <button class="loc-btn primary" id="btn-save-loc">บันทึก</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// Constellation Data
const CONST_DATA = [
  {id:'And',name:'Andromeda',    lr:1.2, ld:37,  lines:[[677,5447],[5447,9640],[9640,14328],[677,3092],[3092,4436]]},
  {id:'Aql',name:'Aquila',       lr:19.7,ld:4,   lines:[[97649,98036],[97649,97804],[97649,96468],[96468,93805]]},
  {id:'Aqr',name:'Aquarius',     lr:22.5,ld:-11, lines:[[109074,106278],[106278,104459],[104459,102618],[102618,100345],[100345,102618]]},
  {id:'Ori',name:'Orion',        lr:5.6, ld:0,   lines:[[24436,25930],[25930,26311],[26311,26727],[26727,27366],[24436,27366],[25930,25336],[25336,27989],[27989,26311],[27989,26207],[25336,26207],[24436,22449],[22449,22509]]},
  {id:'UMa',name:'Ursa Major',   lr:11.5,ld:55,  lines:[[54061,53910],[53910,58001],[58001,59774],[59774,62956],[62956,65378],[65378,67301],[54061,48319],[48319,46733],[46733,46853],[46853,48319],[54061,55219]]},
  {id:'UMi',name:'Ursa Minor',   lr:15.0,ld:78,  lines:[[11767,77055],[77055,79822],[79822,82080],[82080,85822],[85822,75097],[75097,72607],[72607,85822]]},
  {id:'Sco',name:'Scorpius',     lr:16.5,ld:-30, lines:[[80763,78401],[78401,78265],[80763,82545],[82545,84143],[84143,85927],[85927,85696],[84143,86228],[86228,87294],[87294,87585],[85927,86670]]},
  {id:'Cyg',name:'Cygnus',       lr:20.5,ld:43,  lines:[[102098,100453],[100453,104732],[100453,107310],[100453,97165],[100453,95947],[107310,102488]]},
  {id:'Cas',name:'Cassiopeia',   lr:1.5, ld:60,  lines:[[746,3179],[3179,4427],[4427,6686],[6686,8886]]},
  {id:'Cru',name:'Crux',         lr:12.5,ld:-60, lines:[[60718,62434],[61084,60260]]}
];

const hipPos = new Map();
let STARS = [];
const HYG_URL = 'https://raw.githubusercontent.com/astronexus/HYG-Database/master/hygdata_v3.csv';
const CACHE_KEY = 'starview-hyg-v3-idb';
const CACHE_VER = 3;

// ── IDB Wrapper (Replaces localStorage to fix limits) ──
const db = {
  open() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open('StarViewData', 1);
      request.onupgradeneeded = e => e.target.result.createObjectStore('cache');
      request.onsuccess = e => resolve(e.target.result);
      request.onerror = () => reject('IDB Error');
    });
  },
  async get(key) {
    const database = await this.open();
    return new Promise(resolve => {
      const tx = database.transaction('cache');
      const store = tx.objectStore('cache');
      const req = store.get(key);
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = () => resolve(null);
    });
  },
  async set(key, value) {
    const database = await this.open();
    return new Promise(resolve => {
      const tx = database.transaction('cache', 'readwrite');
      const store = tx.objectStore('cache');
      store.put(value, key).onsuccess = resolve;
    });
  }
};

async function loadStars() {
  try {
    const cached = await db.get(CACHE_KEY);
    if (cached && cached.ver === CACHE_VER) {
      STARS = cached.data;
      setLoaderSub(`ใช้ข้อมูลในเครื่อง (${STARS.length.toLocaleString()} ดาว)`);
      setProgress(100);
      return;
    }
  } catch(e) {}

  setLoaderSub('ดาวน์โหลดและประมวลผลข้อมูล (ครั้งแรกจะนานหน่อย)...');
  try {
    const resp = await fetch(HYG_URL);
    if (!resp.ok) throw new Error();
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    const total = parseInt(resp.headers.get('content-length') || '36000000', 10);
    
    let received = 0;
    let buffer = '';
    let lineNum = 0;
    let colMap = null;
    const stars = [];

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      received += value.byteLength;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.trim()) continue;
        const cols = line.split(',');
        if (lineNum === 0) {
          colMap = {}; cols.forEach((c, i) => colMap[c.trim()] = i);
          lineNum++; continue;
        }
        lineNum++;
        const mag = parseFloat(cols[colMap['mag']]);
        if (isNaN(mag) || mag > 7.0) continue;
        
        const ra = parseFloat(cols[colMap['ra']]);
        const dec = parseFloat(cols[colMap['dec']]);
        if (isNaN(ra) || isNaN(dec)) continue;

        stars.push([
          ra, dec, mag,
          parseFloat(cols[colMap['ci']]) || 0,
          (cols[colMap['proper']] || '').trim(),
          (cols[colMap['con']] || '').trim(),
          parseInt(cols[colMap['hip']]) || 0,
          (cols[colMap['spect']] || '').trim().slice(0, 4)
        ]);
      }
      setProgress(Math.round(received / total * 90));
      setLoaderCount(`${stars.length.toLocaleString()} ดาว (${Math.round(received/1024)}KB)`);
    }

    // Sort heavily ONCE during loading, not every frame
    stars.sort((a, b) => b[2] - a[2]); 
    STARS = stars;
    setProgress(95);
    setLoaderSub(`กำลังบันทึกแคชลงเบราว์เซอร์...`);
    
    await db.set(CACHE_KEY, { ver: CACHE_VER, ts: Date.now(), data: stars });
    setProgress(100);

  } catch (err) {
    showToast('โหลดข้อมูลไม่สำเร็จ – โปรดตรวจสอบอินเทอร์เน็ต');
  }
}

// ── Loader UI ──
const loaderEl = document.getElementById('loader');
const progressEl = document.getElementById('progress-fill');
function setLoaderSub(t) { document.getElementById('loader-sub').textContent = t; }
function setLoaderCount(t){ document.getElementById('loader-count').textContent = t; }
function setProgress(p) { progressEl.style.width = p + '%'; }
function hideLoader() { loaderEl.classList.add('hide'); setTimeout(() => loaderEl.style.display = 'none', 700); }

// ── Math & App State ──
const D2R = Math.PI / 180, R2D = 180 / Math.PI;
const app = {
  lat: 13.7563, lon: 100.5018, zoom: 1.0, viewAz: 0, viewAlt: 0,
  magLimit: 6.5, showConst: true, showNames: true, showGrid: false, showMW: true,
  drag: { active: false, x0: 0, y0: 0, az0: 0, alt0: 0 },
  computed: [], highlightHip: -1
};

const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d', { alpha: false });
let W, H, CX, CY, SCALE;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2; CY = H / 2;
  SCALE = Math.min(W, H) * 0.44 * app.zoom;
  draw();
}
window.addEventListener('resize', resize);

function julianDate(d) {
  const a = Math.floor((14 - d.getUTCMonth()) / 12);
  const y = d.getUTCFullYear() + 4800 - a;
  const m = d.getUTCMonth() + 1 + 12 * a - 3;
  const jdn = d.getUTCDate() + Math.floor((153 * m + 2) / 5) + 365 * y + Math.floor(y / 4) - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
  return jdn + (d.getUTCHours() - 12) / 24 + d.getUTCMinutes() / 1440 + d.getUTCSeconds() / 86400;
}
function gmst(jd) {
  const T = (jd - 2451545) / 36525;
  const θ = 280.46061837 + 360.98564736629 * (jd - 2451545) + T * T * 0.000387933 - T * T * T / 38710000;
  return ((θ % 360) + 360) % 360;
}
function toHorizon(raH, dec, lst, lat) {
  const ha = ((lst - raH * 15) % 360 + 360) % 360;
  const haR = ha * D2R, dR = dec * D2R, lR = lat * D2R;
  const sA = Math.sin(dR) * Math.sin(lR) + Math.cos(dR) * Math.cos(lR) * Math.cos(haR);
  const alt = Math.asin(Math.max(-1, Math.min(1, sA))) * R2D;
  const cAz = (Math.sin(dR) - Math.sin(alt * D2R) * Math.sin(lR)) / (Math.cos(alt * D2R) * Math.cos(lR));
  let az = Math.acos(Math.max(-1, Math.min(1, cAz))) * R2D;
  if (Math.sin(haR) > 0) az = 360 - az;
  return { alt, az };
}
function project(alt, az) {
  if (alt < -2) return null;
  const r = (90 - alt) / 90 * SCALE;
  const adjAz = ((az + app.viewAz) % 360 + 360) % 360;
  const azR = adjAz * D2R;
  return { x: CX - r * Math.sin(azR), y: CY - r * Math.cos(azR) };
}
function bvToColor(bv) {
  if (bv < -0.1) return '#b8d4ff'; if (bv < 0.1) return '#ddeeff';
  if (bv < 0.3) return '#ffffff'; if (bv < 0.6) return '#fffacc';
  if (bv < 1.0) return '#ffe080'; if (bv < 1.5) return '#ffbb66'; return '#ff7055';
}

function draw() {
  SCALE = Math.min(W, H) * 0.44 * app.zoom;
  const jd = julianDate(new Date());
  const lst = ((gmst(jd) + app.lon) % 360 + 360) % 360;

  ctx.fillStyle = '#020408';
  ctx.fillRect(0, 0, W, H);
  const sky = ctx.createRadialGradient(CX, CY, 0, CX, CY, SCALE * 1.1);
  sky.addColorStop(0, '#0b1028'); sky.addColorStop(0.6, '#060c1c'); sky.addColorStop(1, '#020408');
  ctx.beginPath(); ctx.arc(CX, CY, SCALE * 1.06, 0, Math.PI * 2); ctx.fillStyle = sky; ctx.fill();

  if (app.showMW) drawMilkyWay();
  if (app.showGrid) drawAltAzGrid();

  app.computed = [];
  hipPos.clear();

  for (let i = 0; i < STARS.length; i++) {
    const s = STARS[i];
    if (s[2] > app.magLimit) continue;
    const { alt, az } = toHorizon(s[0], s[1], lst, app.lat);
    const pos = project(alt + app.viewAlt, az);
    if (!pos) continue;

    if (s[6]) hipPos.set(s[6], pos);
    app.computed.push({ idx: i, x: pos.x, y: pos.y, alt, az, mag: s[2], bv: s[3], name: s[4], con: s[5], hip: s[6], spect: s[7] });
  }

  // Draw lines under the stars
  if (app.showConst) drawConstLines();

  // Draw Stars (Pre-sorted bright on top)
  for (const s of app.computed) {
    const r = Math.max(0.5, (3.5 - s.mag * 0.5) * Math.min(app.zoom, 2.5));
    const isHl = s.hip === app.highlightHip && s.hip > 0;
    
    ctx.beginPath();
    ctx.arc(s.x, s.y, Math.max(0.4, r), 0, Math.PI * 2);
    ctx.fillStyle = isHl ? '#7ec8e3' : bvToColor(s.bv);
    ctx.fill();

    if (app.showNames && s.name && s.mag <= 2.0) {
      ctx.font = `${Math.round(10 + (2 - s.mag) * 1.5)}px sans-serif`;
      ctx.fillStyle = 'rgba(190,215,255,0.7)';
      ctx.fillText(s.name, s.x + r + 4, s.y + 1);
    }
  }

  if (app.showConst) drawConstLabels(lst);
  drawHorizon();
  updateHUD();
}

function drawMilkyWay() {
  ctx.save(); ctx.globalAlpha = 0.08;
  const g = ctx.createLinearGradient(CX - SCALE*0.4, CY - SCALE, CX + SCALE*0.4, CY + SCALE);
  g.addColorStop(0, 'rgba(160,185,255,0)'); g.addColorStop(0.5, 'rgba(160,185,255,1)'); g.addColorStop(1, 'rgba(160,185,255,0)');
  ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(CX, CY, SCALE*0.22, SCALE*1.02, Math.PI*0.32, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawAltAzGrid() {
  ctx.strokeStyle = 'rgba(255,255,255,.06)'; ctx.lineWidth = 0.6;
  for (let alt = 0; alt < 90; alt += 30) { ctx.beginPath(); ctx.arc(CX, CY, (90-alt)/90*SCALE, 0, Math.PI*2); ctx.stroke(); }
  for (let az = 0; az < 360; az += 45) {
    const azR = ((az + app.viewAz)%360+360)%360 * D2R;
    ctx.beginPath(); ctx.moveTo(CX, CY); ctx.lineTo(CX - SCALE*Math.sin(azR), CY - SCALE*Math.cos(azR)); ctx.stroke();
  }
}

function drawConstLines() {
  ctx.strokeStyle = 'rgba(80,140,220,.25)'; ctx.lineWidth = 0.85;
  CONST_DATA.forEach(c => c.lines.forEach(([a, b]) => {
    const pa = hipPos.get(a), pb = hipPos.get(b);
    if (pa && pb && Math.hypot(pa.x - pb.x, pa.y - pb.y) < SCALE * 0.95) {
      ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y); ctx.stroke();
    }
  }));
}

function drawConstLabels(lst) {
  ctx.font = '10px sans-serif'; ctx.fillStyle = 'rgba(90,145,220,.42)'; ctx.textAlign = 'center';
  CONST_DATA.forEach(c => {
    const pos = project(toHorizon(c.lr, c.ld, lst, app.lat).alt + app.viewAlt, toHorizon(c.lr, c.ld, lst, app.lat).az);
    if (pos) ctx.fillText(c.name, pos.x, pos.y);
  });
}

function drawHorizon() {
  ctx.strokeStyle = 'rgba(80,150,220,.45)'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(CX, CY, SCALE, 0, Math.PI*2); ctx.stroke();
  const dirs = [['N',0],['NE',45],['E',90],['SE',135],['S',180],['SW',225],['W',270],['NW',315]];
  dirs.forEach(([lbl, az]) => {
    const azR = ((az + app.viewAz)%360+360)%360 * D2R;
    ctx.font = lbl.length===1 ? 'bold 13px sans-serif' : '10px sans-serif';
    ctx.fillStyle = lbl.length===1 ? 'rgba(126,200,227,.85)' : 'rgba(126,200,227,.42)';
    ctx.fillText(lbl, CX - (SCALE+14)*Math.sin(azR), CY - (SCALE+14)*Math.cos(azR));
  });
}

function updateHUD() {
  const now = new Date();
  document.getElementById('clock-display').textContent = now.toLocaleTimeString('th-TH');
  document.getElementById('date-loc').textContent = `${now.toLocaleDateString('th-TH')} · ${app.lat.toFixed(2)}°N ${app.lon.toFixed(2)}°E`;
  document.getElementById('star-count').textContent = `${app.computed.length.toLocaleString()} ดาวมองเห็น`;
}

// ── Event Listeners ──
let lastSec = -1;
function loop() {
  const s = Math.floor(Date.now() / 1000);
  if (s !== lastSec && !app.drag.active) { lastSec = s; draw(); }
  requestAnimationFrame(loop);
}

canvas.addEventListener('mousedown', e => { app.drag = { active:true, x0:e.clientX, y0:e.clientY, az0:app.viewAz, alt0:app.viewAlt }; canvas.classList.add('dragging'); });
canvas.addEventListener('mousemove', e => {
  if (!app.drag.active) return;
  app.viewAz = app.drag.az0 - (e.clientX - app.drag.x0) * (90/SCALE);
  app.viewAlt = Math.max(-30, Math.min(60, app.drag.alt0 + (e.clientY - app.drag.y0) * (90/SCALE)));
  draw();
});
canvas.addEventListener('mouseup', () => { app.drag.active = false; canvas.classList.remove('dragging'); });
canvas.addEventListener('mouseleave', () => { app.drag.active = false; canvas.classList.remove('dragging'); });
canvas.addEventListener('wheel', e => { e.preventDefault(); app.zoom = Math.max(0.4, Math.min(10, app.zoom * (e.deltaY < 0 ? 1.1 : 0.91))); draw(); }, { passive: false });

let lastDist = 0;
canvas.addEventListener('touchstart', e => {
  if(e.touches.length === 1) app.drag = { active:true, x0:e.touches[0].clientX, y0:e.touches[0].clientY, az0:app.viewAz, alt0:app.viewAlt };
  else lastDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
}, { passive:false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if(e.touches.length === 1 && app.drag.active) {
    app.viewAz = app.drag.az0 - (e.touches[0].clientX - app.drag.x0) * (90/SCALE);
    app.viewAlt = Math.max(-30, Math.min(60, app.drag.alt0 + (e.touches[0].clientY - app.drag.y0) * (90/SCALE)));
  } else if(e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    if(lastDist > 0) app.zoom = Math.max(0.4, Math.min(10, app.zoom * dist / lastDist));
    lastDist = dist;
  }
  draw();
}, { passive:false });
canvas.addEventListener('touchend', () => { app.drag.active = false; lastDist = 0; });

let clickTimer;
canvas.addEventListener('click', e => {
  clearTimeout(clickTimer);
  clickTimer = setTimeout(() => {
    let best = null, bestD = 22;
    app.computed.forEach(s => { const d = Math.hypot(s.x - e.clientX, s.y - e.clientY); if(d < bestD) { bestD = d; best = s; }});
    best ? showStarPopup(best, e.clientX, e.clientY) : hideStarPopup();
  }, 50);
});

function showStarPopup(s, mx, my) {
  app.highlightHip = s.hip;
  const el = document.getElementById('star-popup');
  document.getElementById('sp-name').textContent = s.name || `HIP ${s.hip}`;
  document.getElementById('sp-mag').textContent = s.mag.toFixed(2);
  document.getElementById('sp-alt').textContent = s.alt.toFixed(2) + '°';
  document.getElementById('sp-az').textContent = s.az.toFixed(2) + '°';
  document.getElementById('sp-radec').textContent = `${STARS[s.idx][0].toFixed(3)}h  ${STARS[s.idx][1].toFixed(2)}°`;
  document.getElementById('sp-con').textContent = s.con || '—';
  document.getElementById('sp-spect').textContent = s.spect || '—';
  
  let px = mx + 14, py = Math.max(60, Math.min(my - 80, H - 230));
  if(px + 215 > W - 10) px = mx - 229;
  el.style.left = px + 'px'; el.style.top = py + 'px'; el.classList.add('show');
  draw();
}
function hideStarPopup() { app.highlightHip = -1; document.getElementById('star-popup').classList.remove('show'); draw(); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3500); }

// UI Controls
['btn-const','btn-names','btn-grid','btn-mw'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    const k = id.replace('btn-',''); const prop = 'show' + k.charAt(0).toUpperCase() + k.slice(1);
    app[prop] = !app[prop]; e.currentTarget.classList.toggle('active', app[prop]); draw();
  });
});
document.getElementById('btn-now').addEventListener('click', () => { app.viewAz = 0; app.viewAlt = 0; app.zoom = 1.0; draw(); });
document.getElementById('mag-slider').addEventListener('input', e => { app.magLimit = parseFloat(e.target.value); document.getElementById('mag-val').textContent = app.magLimit.toFixed(1); draw(); });

// Search Logic
const swrap = document.getElementById('search-wrap'), sres = document.getElementById('search-results');
document.getElementById('search-toggle').addEventListener('click', () => { if(swrap.classList.toggle('show')) document.getElementById('search-input').focus(); else sres.innerHTML=''; });
document.getElementById('search-input').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase(); sres.innerHTML = '';
  if(q.length < 1) return;
  const hits = STARS.filter(s => (s[4]&&s[4].toLowerCase().includes(q)) || (s[5]&&s[5].toLowerCase()===q) || (s[6]&&String(s[6])===q)).slice(0, 10);
  hits.forEach(s => {
    const div = document.createElement('div'); div.className = 'sr-item';
    div.innerHTML = `<span class="sr-item-name">${s[4] || 'HIP '+s[6]}</span><span class="sr-item-meta">mag ${s[2].toFixed(2)} ${s[5]}</span>`;
    div.onclick = () => {
      const found = app.computed.find(c => c.hip === s[6]);
      found ? showStarPopup(found, found.x, found.y) : showToast('ดาวดวงนี้อยู่ใต้ขอบฟ้า');
      swrap.classList.remove('show');
    };
    sres.appendChild(div);
  });
});

// Init
(async () => {
  resize();
  navigator.geolocation?.getCurrentPosition(p => { app.lat = p.coords.latitude; app.lon = p.coords.longitude; }, () => {});
  await loadStars();
  hideLoader();
  draw();
  requestAnimationFrame(loop);
})();
</script>
</body>
